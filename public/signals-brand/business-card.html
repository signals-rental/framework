<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signals — Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Martian+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f172a;
            --navy-mid: #1e293b;
            --white: #ffffff;
            --grey: #64748b;
            --grey-light: #94a3b8;
            --green: #059669;
            --blue: #2563eb;
            --grid-dark-fine: rgba(148, 163, 184, 0.08);
            --grid-dark-strong: rgba(148, 163, 184, 0.15);
            --font-display: 'Chakra Petch', sans-serif;
            --font-mono: 'Martian Mono', monospace;

            /* Card dimensions: 84mm x 55mm at 300dpi */
            --card-w: 84mm;
            --card-h: 55mm;
            /* 3mm bleed each side */
            --bleed: 3mm;
            --card-w-bleed: 90mm;
            --card-h-bleed: 61mm;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-mono);
            background: #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 40px;
            padding: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .label {
            font-family: var(--font-display);
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--grey);
            margin-bottom: 8px;
        }

        /* ── Card shell ── */
        .card {
            width: var(--card-w-bleed);
            height: var(--card-h-bleed);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
        }


        /* ─────────────────────────────────────────────
           FRONT — Logo side
           ───────────────────────────────────────────── */
        .card-front {
            background-color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Grid overlay — real SVG so html2canvas renders it */
        .grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .grid-overlay svg {
            width: 100%;
            height: 100%;
        }

        .front-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .logo-mark {
            display: inline-block;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 2.5px solid var(--white);
            padding: 10px 24px;
            position: relative;
            color: var(--white);
            font-size: 1.75rem;
        }
        .logo-accent {
            position: absolute;
            top: -2.5px;
            right: -2.5px;
            width: 14px;
            height: 14px;
            background: var(--green);
        }

        .tagline {
            font-family: var(--font-mono);
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--grey-light);
        }

        /* Corner accent — bottom-left geometric detail */
        .front-corner {
            position: absolute;
            bottom: var(--bleed);
            left: var(--bleed);
            width: 12px;
            height: 12px;
            border-left: 2px solid var(--green);
            border-bottom: 2px solid var(--green);
            opacity: 0.5;
        }

        .front-corner-tr {
            position: absolute;
            top: var(--bleed);
            right: var(--bleed);
            width: 12px;
            height: 12px;
            border-right: 2px solid var(--green);
            border-top: 2px solid var(--green);
            opacity: 0.5;
        }

        /* ─────────────────────────────────────────────
           BACK — Contact info side
           ───────────────────────────────────────────── */
        .card-back {
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(var(--bleed) + 5mm) calc(var(--bleed) + 6mm);
        }

        .back-top {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .person-name {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.0625rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--navy);
        }

        .person-title {
            font-family: var(--font-mono);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--grey);
        }

        .back-bottom {
            display: flex;
            flex-direction: column;
            gap: 3.5px;
        }

        .contact-line {
            font-family: var(--font-mono);
            font-size: 8.5px;
            color: var(--navy);
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .contact-label {
            font-size: 7.5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--grey-light);
            width: 28px;
            flex-shrink: 0;
        }

        /* Accent bar */
        .accent-bar {
            position: absolute;
            top: var(--bleed);
            left: var(--bleed);
            right: var(--bleed);
            height: 2.5px;
            background: var(--green);
        }


        /* ── Export toolbar ── */
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .toolbar button {
            font-family: var(--font-display);
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 8px 20px;
            border: 2px solid var(--navy);
            background: var(--navy);
            color: var(--white);
            cursor: pointer;
            position: relative;
            transition: opacity 0.15s;
        }
        .toolbar button:hover { opacity: 0.85; }
        .toolbar button::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 6px;
            height: 6px;
            background: var(--green);
        }

        .toolbar .info {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--grey);
        }

        /* ── Export mode — scale cards to 300dpi pixel size ── */
        body.exporting {
            background: none;
        }
        body.exporting .toolbar,
        body.exporting .label {
            display: none;
        }
        body.exporting .card {
            box-shadow: none;
        }

        /* ── Print styles ── */
        @media print {
            body {
                background: none;
                gap: 20mm;
            }
            .label, .toolbar { display: none; }
            .card { box-shadow: none; }
            @page {
                size: A4;
                margin: 20mm;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <!-- Toolbar -->
    <div class="toolbar">
        <button onclick="exportCard('front')">Export Front (300dpi PNG)</button>
        <button onclick="exportCard('back')">Export Back (300dpi PNG)</button>
        <button onclick="exportCard('both')">Export Both</button>
        <span class="info">90 × 61 mm @ 600dpi → 2126 × 1441 px</span>
    </div>

    <!-- FRONT -->
    <div>
        <div class="label">Front — 84 × 55 mm (with 3 mm bleed)</div>
        <div class="card card-front" id="card-front">
            <div class="grid-overlay">
                <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <defs>
                        <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
                            <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
                        </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grid)"/>
                </svg>
            </div>
            <div class="front-corner"></div>
            <div class="front-corner-tr"></div>
            <div class="front-content">
                <div class="logo-mark">Signals<div class="logo-accent"></div></div>
                <div class="tagline">Rental Framework</div>
            </div>
        </div>
    </div>

    <!-- BACK -->
    <div>
        <div class="label">Back — 84 × 55 mm (with 3 mm bleed)</div>
        <div class="card card-back" id="card-back">
            <div class="accent-bar"></div>
            <div class="back-top">
                <div class="person-name">Benjamin Bowles</div>
                <div class="person-title">Founder</div>
            </div>
            <div class="back-bottom">
                <div class="contact-line">
                    <span class="contact-label">Tel</span>
                    +44(0)7415 372407
                </div>
                <div class="contact-line">
                    <span class="contact-label">Email</span>
                    ben@signals.rent
                </div>
                <div class="contact-line">
                    <span class="contact-label">Web</span>
                    signals.rent
                </div>
            </div>
        </div>
    </div>

    <script>
        // 90mm x 61mm at 600dpi (2x oversampled for crisp output)
        const TARGET_W = 2126;
        const TARGET_H = 1441;

        async function captureCard(id) {
            const el = document.getElementById(id);
            const rect = el.getBoundingClientRect();
            const scale = TARGET_W / rect.width;

            const canvas = await html2canvas(el, {
                scale: scale,
                useCORS: true,
                backgroundColor: null,
                width: rect.width,
                height: rect.height,
            });

            return canvas;
        }

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        async function exportCard(side) {
            const sides = side === 'both' ? ['front', 'back'] : [side];

            for (const s of sides) {
                const canvas = await captureCard('card-' + s);
                downloadCanvas(canvas, 'signals-card-' + s + '-300dpi.png');
            }
        }
    </script>

</body>
</html>
